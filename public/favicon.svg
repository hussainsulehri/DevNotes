<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <linearGradient id="page" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e8eaff"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="url(#bg)"/>
  <!-- Notepad page -->
  <rect x="15" y="10" width="34" height="44" rx="4" ry="4" fill="url(#page)" opacity="0.95"/>
  <!-- Folded corner -->
  <path d="M39 10 L49 10 L49 20 Z" fill="#c7d2fe" opacity="0.7"/>
  <path d="M39 10 L39 20 L49 20" fill="none" stroke="#6C63FF" stroke-width="0.5" opacity="0.5"/>
  <!-- Spiral binding dots -->
  <circle cx="15" cy="18" r="2" fill="#4338ca"/>
  <circle cx="15" cy="28" r="2" fill="#4338ca"/>
  <circle cx="15" cy="38" r="2" fill="#4338ca"/>
  <circle cx="15" cy="48" r="2" fill="#4338ca"/>
  <!-- Text lines -->
  <rect x="21" y="20" width="22" height="2.5" rx="1.25" fill="#6C63FF" opacity="0.7"/>
  <rect x="21" y="27" width="18" height="2.5" rx="1.25" fill="#6C63FF" opacity="0.5"/>
  <rect x="21" y="34" width="20" height="2.5" rx="1.25" fill="#6C63FF" opacity="0.4"/>
  <rect x="21" y="41" width="15" height="2.5" rx="1.25" fill="#6C63FF" opacity="0.3"/>
  <!-- Pencil -->
  <g transform="translate(36, 36) rotate(45)">
    <rect x="0" y="-2.5" width="18" height="5" rx="1" fill="#fbbf24"/>
    <rect x="0" y="-2.5" width="4" height="5" rx="1" fill="#f59e0b"/>
    <polygon points="-4,-2.5 0,-2.5 0,2.5 -4,2.5 -6,0" fill="#374151"/>
    <rect x="15" y="-2.5" width="3" height="5" rx="0.5" fill="#fca5a5"/>
  </g>
</svg>
